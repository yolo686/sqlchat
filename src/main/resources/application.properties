spring.application.name=sqlChat

# 服务器配置
server.port=8080

# 数据库配置（用于存储用户和配置信息）
spring.datasource.url=jdbc:mysql://localhost:3306/sqlchat?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=zbf103056
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# 关闭Hibernate日志
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# LangChain4j配置 - Chat Model
langchain4j.open-ai.chat-model.api-key=sk-5ac027bfea2a4ea2ba4c7144b01fbed1
langchain4j.open-ai.chat-model.model-name=qwen-plus
langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# LangChain4j配置 - Streaming Chat Model
langchain4j.open-ai.streaming-chat-model.api-key=sk-5ac027bfea2a4ea2ba4c7144b01fbed1
langchain4j.open-ai.streaming-chat-model.model-name=qwen-plus
langchain4j.open-ai.streaming-chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
langchain4j.open-ai.streaming-chat-model.log-requests=true
langchain4j.open-ai.streaming-chat-model.log-responses=true
