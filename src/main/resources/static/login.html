<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - NL2SQL</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px;
            width: 600px;
            max-width: 800px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .login-header p {
            color: #666;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            background: none;
            border: none;
            font-size: 18px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #555;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 16px;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-header">
                <h1>🔍 NL2SQL</h1>
                <p>自然语言转SQL工具</p>
            </div>

            <div class="tabs">
                <button class="tab" :class="{ active: activeTab === 'login' }" @click="activeTab = 'login'">登录</button>
                <button class="tab" :class="{ active: activeTab === 'register' }" @click="activeTab = 'register'">注册</button>
            </div>

            <!-- 登录表单 -->
            <div v-if="activeTab === 'login'">
                <div v-if="message" :class="['message', messageType]">{{ message }}</div>
                <div class="form-group">
                    <label>用户名</label>
                    <input v-model="loginForm.username" type="text" placeholder="请输入用户名" @keyup.enter="login">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input v-model="loginForm.password" type="password" placeholder="请输入密码" @keyup.enter="login">
                </div>
                <button class="btn btn-primary" @click="login" :disabled="loading">
                    {{ loading ? '登录中...' : '登录' }}
                </button>
            </div>

            <!-- 注册表单 -->
            <div v-if="activeTab === 'register'">
                <div v-if="message" :class="['message', messageType]">{{ message }}</div>
                <div class="form-group">
                    <label>用户名</label>
                    <input v-model="registerForm.username" type="text" placeholder="请输入用户名" @keyup.enter="register">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input v-model="registerForm.password" type="password" placeholder="请输入密码" @keyup.enter="register">
                </div>
                <div class="form-group">
                    <label>邮箱（可选）</label>
                    <input v-model="registerForm.email" type="email" placeholder="请输入邮箱" @keyup.enter="register">
                </div>
                <button class="btn btn-primary" @click="register" :disabled="loading">
                    {{ loading ? '注册中...' : '注册' }}
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    activeTab: 'login',
                    loading: false,
                    message: '',
                    messageType: 'error',
                    loginForm: {
                        username: '',
                        password: ''
                    },
                    registerForm: {
                        username: '',
                        password: '',
                        email: ''
                    }
                };
            },
            methods: {
                async login() {
                    if (!this.loginForm.username || !this.loginForm.password) {
                        this.showMessage('请输入用户名和密码', 'error');
                        return;
                    }

                    this.loading = true;
                    this.message = '';

                    try {
                        const response = await axios.post('/api/user/login', this.loginForm, {
                            withCredentials: true
                        });
                        
                        if (response.data.success) {
                            this.showMessage('登录成功，正在跳转...', 'success');
                            setTimeout(() => {
                                window.location.href = '/index.html';
                            }, 1000);
                        } else {
                            this.showMessage(response.data.message || '登录失败', 'error');
                        }
                    } catch (error) {
                        this.showMessage(error.response?.data?.message || error.message || '登录失败', 'error');
                    } finally {
                        this.loading = false;
                    }
                },
                async register() {
                    if (!this.registerForm.username || !this.registerForm.password) {
                        this.showMessage('请输入用户名和密码', 'error');
                        return;
                    }

                    this.loading = true;
                    this.message = '';

                    try {
                        const response = await axios.post('/api/user/register', this.registerForm, {
                            withCredentials: true
                        });
                        
                        if (response.data.success) {
                            this.showMessage('注册成功，请登录', 'success');
                            setTimeout(() => {
                                this.activeTab = 'login';
                                this.registerForm = { username: '', password: '', email: '' };
                            }, 1500);
                        } else {
                            this.showMessage(response.data.message || '注册失败', 'error');
                        }
                    } catch (error) {
                        this.showMessage(error.response?.data?.message || error.message || '注册失败', 'error');
                    } finally {
                        this.loading = false;
                    }
                },
                showMessage(msg, type) {
                    this.message = msg;
                    this.messageType = type;
                    if (type === 'success') {
                        setTimeout(() => {
                            this.message = '';
                        }, 3000);
                    }
                }
            },
            mounted() {
                // 检查是否已登录
                axios.get('/api/user/current', { withCredentials: true })
                    .then(response => {
                        if (response.data.success) {
                            window.location.href = '/index.html';
                        }
                    })
                    .catch(() => {
                        // 未登录，继续显示登录页面
                    });
            }
        }).mount('#app');
    </script>
</body>
</html>
